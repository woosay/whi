<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>위스키 관리 앱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>
  <style>
    :root { --bg:#0f0f14; --card:#191923; --card-soft:#232332; --text:#f3f4f6; --muted:#b8bdd0; --accent:#ffb703; --danger:#ef476f; --radius:16px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Pretendard',system-ui,sans-serif; color:var(--text); background:radial-gradient(circle at top right,#24243e 0%,#0f0f14 45%); min-height:100vh; padding:2rem 1rem; }
    .container { max-width:1100px; margin:0 auto; }
    .hero { display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:1rem; }
    .hero h1 { margin:0; font-size:1.8rem; }
    .hero p { margin:.4rem 0 0; color:var(--muted); }
    .stats { display:flex; gap:.6rem; flex-wrap:wrap; }
    .stat { background:linear-gradient(135deg,#2a2a3b,#1b1b27); border:1px solid #303046; border-radius:12px; padding:.6rem .8rem; font-size:.9rem; }
    .grid { display:grid; gap:1rem; }
    .card { background:rgba(25,25,35,.92); border:1px solid #2f2f42; border-radius:var(--radius); padding:1rem; }
    h2 { margin:.2rem 0 1rem; font-size:1.1rem; }
    form { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:.75rem; }
    .field { display:flex; flex-direction:column; gap:.4rem; }
    .field label { font-size:.83rem; color:var(--muted); }
    input, select, textarea, button { border:1px solid #3a3a53; background:var(--card-soft); color:var(--text); border-radius:12px; padding:.65rem .8rem; font-size:.95rem; }
    button { cursor:pointer; font-weight:600; }
    .primary { background:linear-gradient(135deg,var(--accent),#fb8500); color:#1b1b1f; border:none; }
    .secondary { background:#2c2c41; }
    .danger { background:rgba(239,71,111,.15); color:#ffd4df; border-color:rgba(239,71,111,.5); }
    .toolbar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-bottom:.8rem; }
    .toolbar input, .toolbar select { min-width:180px; }
    table { width:100%; border-collapse:separate; border-spacing:0 .45rem; }
    th { color:var(--muted); text-align:left; font-size:.82rem; padding:.3rem .55rem; }
    td { background:#202030; padding:.65rem .55rem; font-size:.92rem; }
    td:first-child { border-radius:10px 0 0 10px; } td:last-child { border-radius:0 10px 10px 0; }
    .pill { border-radius:999px; padding:.2rem .55rem; font-size:.78rem; font-weight:700; display:inline-flex; gap:.35rem; align-items:center; }
    .Opened { background:rgba(6,214,160,.18); color:#9dffe4; } .Unopened { background:rgba(142,202,230,.18); color:#caefff; } .Wishlist { background:rgba(255,183,3,.2); color:#ffe3a0; }
    .row-actions { display:flex; gap:.35rem; }
    .muted { color:var(--muted); font-size:.88rem; }
    .api-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:.7rem; margin-top:.8rem; }
    .api-item { background:#202030; border:1px solid #30304a; border-radius:12px; overflow:hidden; }
    .api-item img { width:100%; height:130px; object-fit:cover; background:#10101a; }
    .api-item .meta { padding:.6rem; }
    .api-item h4 { margin:0 0 .4rem; font-size:.95rem; }
    .api-item p { margin:.15rem 0; font-size:.82rem; color:var(--muted); }
    .small { font-size:.8rem; color:var(--muted); }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div><h1><i class="fa-solid fa-whiskey-glass"></i> 위스키 컬렉션 매니저</h1><p>API로 위스키를 검색하고 바로 내 컬렉션에 추가하세요.</p></div>
    <div class="stats" id="stats"></div>
  </div>

  <section class="card">
    <h2><i class="fa-solid fa-cloud-arrow-down"></i> 위스키 불러오기 (API)</h2>
    <div class="toolbar">
      <input id="apiQuery" placeholder="예: Glenfiddich, Macallan" />
      <button class="primary" id="fetchBtn"><i class="fa-solid fa-magnifying-glass"></i> API 검색</button>
    </div>
    <p class="small">CocktailDB API에서 위스키 기반 레시피의 이름/이미지/설명을 불러옵니다.</p>
    <div class="api-grid" id="apiResults"></div>
  </section>

  <section class="card">
    <h2><i class="fa-solid fa-pen-to-square"></i> 위스키 추가 / 수정</h2>
    <form id="whiskyForm">
      <input type="hidden" id="editId" />
      <div class="field"><label>이름</label><input id="name" required /></div>
      <div class="field"><label>증류소</label><input id="distillery" required /></div>
      <div class="field"><label>도수(ABV)</label><input id="abv" type="number" min="0" max="100" step="0.1" required /></div>
      <div class="field"><label>숙성 연수</label><input id="year" type="number" min="0" max="100" /></div>
      <div class="field"><label>상태</label><select id="status"><option value="Unopened">미개봉</option><option value="Opened">개봉</option><option value="Wishlist">위시리스트</option></select></div>
      <div class="field"><label>평점</label><input id="rating" type="number" min="0" max="5" step="0.5" /></div>
      <div class="field" style="grid-column:1/-1;"><label>노트</label><textarea id="notes"></textarea></div>
      <button class="primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
      <button class="secondary" type="button" id="resetBtn">초기화</button>
    </form>
  </section>

  <section class="card">
    <h2><i class="fa-solid fa-layer-group"></i> 내 컬렉션</h2>
    <div class="toolbar">
      <input id="search" placeholder="🔎 이름/증류소 검색" />
      <select id="statusFilter"><option value="ALL">전체 상태</option><option value="Unopened">미개봉</option><option value="Opened">개봉</option><option value="Wishlist">위시리스트</option></select>
      <button id="exportBtn" class="secondary">내보내기</button>
      <label class="secondary" style="display:inline-flex;align-items:center;gap:.45rem;cursor:pointer;">가져오기<input id="importFile" type="file" accept="application/json" hidden /></label>
    </div>
    <table><thead><tr><th>이름</th><th>증류소</th><th>ABV</th><th>상태</th><th>작업</th></tr></thead><tbody id="tbody"></tbody></table>
  </section>
</div>

<script>
const KEY='whiskyCollectionV1';
const API_LIST='https://www.thecocktaildb.com/api/json/v1/1/filter.php?i=Whiskey';
const API_DETAIL='https://www.thecocktaildb.com/api/json/v1/1/lookup.php?i=';
const $=id=>document.getElementById(id);
const form=$('whiskyForm'), tbody=$('tbody'), stats=$('stats'), apiResults=$('apiResults');
const fields=['editId','name','distillery','abv','year','status','rating','notes'].reduce((a,id)=>(a[id]=$(id),a),{});
const load=()=>JSON.parse(localStorage.getItem(KEY)||'[]'); const save=d=>localStorage.setItem(KEY,JSON.stringify(d)); const uid=()=>Math.random().toString(36).slice(2,10);
let apiCache=[];
const labelStatus=s=>s==='Opened'?'개봉':s==='Wishlist'?'위시리스트':'미개봉';

function drawStats(list){ const c={All:list.length,Opened:0,Unopened:0,Wishlist:0}; list.forEach(v=>c[v.status]++); stats.innerHTML=`<div class="stat">전체 ${c.All}</div><div class="stat">개봉 ${c.Opened}</div><div class="stat">미개봉 ${c.Unopened}</div><div class="stat">위시 ${c.Wishlist}</div>`; }
function clearForm(){ form.reset(); fields.editId.value=''; fields.status.value='Unopened'; }

function render(){ const all=load(); drawStats(all); const q=$('search').value.toLowerCase().trim(), sf=$('statusFilter').value;
  const items=all.filter(w=>(!q||`${w.name} ${w.distillery}`.toLowerCase().includes(q))&&(sf==='ALL'||w.status===sf));
  tbody.innerHTML=items.map(w=>`<tr><td>${w.name}</td><td>${w.distillery}</td><td>${w.abv}%</td><td><span class="pill ${w.status}">${labelStatus(w.status)}</span></td><td class="row-actions"><button onclick="editItem('${w.id}')"><i class="fa-solid fa-pen"></i></button><button class="danger" onclick="deleteItem('${w.id}')"><i class="fa-solid fa-trash"></i></button></td></tr>`).join('') || '<tr><td colspan="5" class="muted">아직 데이터가 없습니다.</td></tr>';
}

function normalizeApiItem(x){
  return {
    name: x.strDrink || x.name || "이름 없음",
    distillery: "CocktailDB",
    abv: 40,
    image: x.strDrinkThumb || "",
    notes: x.strInstructions || ""
  }
}

function renderApiResults(items){
  apiResults.innerHTML = items.map((w,i)=>`<article class="api-item"><img src="${w.image || 'https://dummyimage.com/400x260/1a1a28/aaaaaa&text=No+Image'}" alt="${w.name}"><div class="meta"><h4>${w.name}</h4><p>증류소/브랜드: ${w.distillery}</p><p>도수: ${w.abv}%</p><button class="primary" onclick="addFromApi(${i})"><i class="fa-solid fa-plus"></i> 컬렉션에 추가</button></div></article>`).join('') || '<p class="muted">검색 결과가 없습니다.</p>';
}

async function fetchWhiskies(){
  $('fetchBtn').disabled=true; $('fetchBtn').textContent='불러오는 중...';
  try{
    const listRes=await fetch(API_LIST); if(!listRes.ok) throw new Error('API 요청 실패');
    const listJson=await listRes.json();
    const drinks=(listJson.drinks||[]).slice(0,36);
    const details=await Promise.all(drinks.map(async d=>{
      try{
        const r=await fetch(API_DETAIL + d.idDrink);
        if(!r.ok) return d;
        const j=await r.json();
        return { ...d, ...(j.drinks?.[0]||{}) };
      }catch{ return d; }
    }));
    const query=$('apiQuery').value.trim().toLowerCase();
    apiCache=details.map(normalizeApiItem).filter(v=>!query || v.name.toLowerCase().includes(query)).slice(0,24);
    renderApiResults(apiCache);
  }catch(err){ apiResults.innerHTML=`<p class="muted">불러오기 실패: ${err.message}</p>`; }
  finally{ $('fetchBtn').disabled=false; $('fetchBtn').innerHTML='<i class="fa-solid fa-magnifying-glass"></i> API 검색'; }
}

function addFromApi(index){ const w=apiCache[index]; if(!w) return;
  fields.name.value=w.name; fields.distillery.value=w.distillery; fields.abv.value=w.abv; fields.notes.value=w.notes;
  alert('폼에 자동 입력되었습니다. 필요하면 수정 후 저장하세요.');
}
window.addFromApi=addFromApi;
function editItem(id){ const w=load().find(v=>v.id===id); if(!w) return; Object.keys(fields).forEach(k=>fields[k].value=w[k]??''); }
function deleteItem(id){ if(!confirm('삭제할까요?')) return; save(load().filter(v=>v.id!==id)); render(); }
window.editItem=editItem; window.deleteItem=deleteItem;

form.addEventListener('submit',e=>{e.preventDefault(); const item={id:fields.editId.value||uid(),name:fields.name.value.trim(),distillery:fields.distillery.value.trim(),abv:Number(fields.abv.value),year:fields.year.value?Number(fields.year.value):null,status:fields.status.value,rating:fields.rating.value?Number(fields.rating.value):null,notes:fields.notes.value.trim()}; const list=load(); const i=list.findIndex(v=>v.id===item.id); i>-1?list[i]=item:list.unshift(item); save(list); clearForm(); render();});
$('resetBtn').addEventListener('click',clearForm); $('search').addEventListener('input',render); $('statusFilter').addEventListener('change',render); $('fetchBtn').addEventListener('click',fetchWhiskies);
$('exportBtn').addEventListener('click',()=>{ const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='whisky-collection.json'; a.click(); URL.revokeObjectURL(a.href); });
$('importFile').addEventListener('change',async e=>{ const f=e.target.files?.[0]; if(!f)return; try{ const data=JSON.parse(await f.text()); if(!Array.isArray(data)) throw new Error('배열 형식만 가능'); save(data); render(); }catch(err){ alert(err.message); } });
clearForm(); render();
</script>
</body>
</html>
